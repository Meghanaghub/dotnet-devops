name: CI/CD to AKS (.NET + Docker + ACR + Helm)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

    # ------------------------------
    # LOGIN TO AZURE USING SP
    # ------------------------------
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # ------------------------------
    # ACR LOGIN
    # ------------------------------
    - name: Azure CLI - ACR Login
      run: |
        az acr login --name mbdevopsacr01

    # ------------------------------
    # DOCKER BUILD & PUSH
    # ------------------------------
    - name: Set image tag
      id: vars
      run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

    - name: Build Docker image
      run: |
        docker build -t mbdevopsacr01.azurecr.io/dotnet-devops-project:${{ steps.vars.outputs.IMAGE_TAG }} .

    - name: Push Docker image
      run: |
        docker push mbdevopsacr01.azurecr.io/dotnet-devops-project:${{ steps.vars.outputs.IMAGE_TAG }}

    # ------------------------------
    # UPDATE HELM VALUES
    # ------------------------------
    - name: Update image tag in helm values
      run: |
        sed -i "s/tag:.*/tag: \"${{ steps.vars.outputs.IMAGE_TAG }}\"/g" dotnet-app-chart/values.yaml

    # ------------------------------
    # AKS LOGIN
    # ------------------------------
    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group meghana \
          --name mb-aks \
          --overwrite-existing

    # ------------------------------
    # HELM UPGRADE DEPLOYMENT
    # ------------------------------
    - name: Helm Upgrade
      run: |
        helm upgrade --install dotnetapp ./dotnet-app-chart -n dotnet-app