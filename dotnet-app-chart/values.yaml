replicaCount: 1

image:
  repository: mbdevopsacr01.azurecr.io/dotnet-devops-project
  tag: "v1"

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  
containerPort: 8080

serviceAccount:
  create: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
